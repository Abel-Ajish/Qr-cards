<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QR Swiper Pro</title>
    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- QR Code Library -->
    <script src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #030303; color: white; -webkit-tap-highlight-color: transparent; overflow: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .card-stack { perspective: 1000px; }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #6366f1;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body class="font-sans antialiased select-none">

    <div id="app" class="min-h-screen flex flex-col items-center p-6">
        <!-- Header -->
        <header class="relative z-[150] w-full max-w-md flex justify-between items-center pt-10 pb-4 px-2">
            <div class="flex flex-col">
                <h1 class="text-5xl font-black italic tracking-tighter text-white leading-none">VAULT</h1>
                <div class="w-12 h-1.5 bg-indigo-600 rounded-full mt-2"></div>
            </div>
            <div class="flex gap-4">
                <button onclick="toggleDirectory()" class="w-14 h-14 bg-neutral-900 rounded-[1.5rem] flex items-center justify-center border border-white/10 active:scale-90 transition-all shadow-xl">
                    <i data-lucide="settings" class="w-6 h-6 text-white"></i>
                </button>
                <button onclick="openForge()" class="w-14 h-14 bg-white text-black rounded-[1.5rem] flex items-center justify-center shadow-2xl active:scale-90 transition-all">
                    <i data-lucide="plus" class="w-8 h-8"></i>
                </button>
            </div>
        </header>

        <!-- Main Viewport -->
        <main id="card-container" class="relative z-20 w-full max-w-[340px] h-[520px] mt-12 flex items-center justify-center">
            <!-- Cards or Empty State injected here -->
        </main>

        <!-- Pagination Dots -->
        <div id="dots-container" class="mt-10 flex gap-2 transition-all duration-700"></div>

        <!-- Overlays (Forge, Directory, Cropper) -->
        <div id="forge-overlay" class="fixed inset-0 z-[200] bg-black hidden flex items-end justify-center px-4 pb-4"></div>
        <div id="directory-overlay" class="fixed inset-0 z-[180] bg-black/98 backdrop-blur-3xl hidden flex flex-col p-8 pt-32"></div>
        <div id="cropper-overlay" class="fixed inset-0 z-[600] bg-black hidden flex flex-col items-center justify-center p-6"></div>
    </div>

    <script>
        const PLATFORMS = [
            { id: 'twitter', name: 'Twitter', color: '#1DA1F2', icon: 'twitter', defaultLogo: 'https://cdn-icons-png.flaticon.com/512/733/733579.png' },
            { id: 'instagram', name: 'Instagram', color: '#E4405F', icon: 'instagram', defaultLogo: 'https://cdn-icons-png.flaticon.com/512/174/174855.png' },
            { id: 'linkedin', name: 'LinkedIn', color: '#0077B5', icon: 'linkedin', defaultLogo: 'https://cdn-icons-png.flaticon.com/512/174/174857.png' },
            { id: 'website', name: 'Website', color: '#4CAF50', icon: 'globe', defaultLogo: 'https://cdn-icons-png.flaticon.com/512/1006/1006771.png' },
            { id: 'custom', name: 'Custom', color: '#6366F1', icon: 'fingerprint', defaultLogo: null }
        ];

        let cards = JSON.parse(localStorage.getItem('qr-vault-mobile-v1') || '[]');
        let currentIndex = 0;
        let isLocked = false;
        let editingId = null;
        let tempCard = { platformId: 'twitter', handle: '', url: '', bgColor: '#1DA1F2', bgImage: null, customIcon: null };

        function render() {
            const container = document.getElementById('card-container');
            const dots = document.getElementById('dots-container');
            container.innerHTML = '';
            dots.innerHTML = '';

            if (cards.length === 0) {
                container.innerHTML = `
                    <div class="w-full h-[480px] bg-neutral-900/10 border-2 border-dashed border-white/5 rounded-[4rem] flex flex-col items-center justify-center p-12 text-center gap-10">
                        <div class="w-24 h-24 bg-indigo-600/10 rounded-full flex items-center justify-center"><i data-lucide="qr-code" class="text-indigo-500 w-12 h-12"></i></div>
                        <div class="space-y-3">
                            <h3 class="text-2xl font-black italic uppercase tracking-tighter">Vault Empty</h3>
                            <p class="text-neutral-500 text-[10px] font-black tracking-widest uppercase opacity-60">Forge your first digital identity.</p>
                        </div>
                        <button onclick="openForge()" class="bg-white text-black px-10 py-5 rounded-[2rem] font-black uppercase tracking-[0.2em] text-[10px] active:scale-95 shadow-2xl">Forge Entry</button>
                    </div>
                `;
            } else {
                cards.forEach((card, i) => {
                    const isActive = i === currentIndex;
                    const offset = (i - currentIndex + cards.length) % cards.length;
                    const zIndex = 100 - offset;
                    const yPos = offset * 20;
                    const scale = 1 - (offset * 0.05);
                    const opacity = offset > 3 ? 0 : 1;

                    const cardEl = document.createElement('div');
                    cardEl.className = "absolute top-0 w-full h-[480px] rounded-[3.5rem] shadow-2xl overflow-hidden flex flex-col transition-all duration-500 ease-out";
                    cardEl.style.cssText = `
                        transform: translate3d(0, ${yPos}px, 0) scale(${scale});
                        z-index: ${zIndex};
                        opacity: ${opacity};
                        background-color: ${card.bgColor};
                        background-image: ${card.bgImage ? `linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0) 40%, rgba(0,0,0,0.9) 100%), url(${card.bgImage})` : 'none'};
                        background-size: cover;
                    `;

                    const platform = PLATFORMS.find(p => p.id === card.platformId);
                    const icon = card.customIcon || platform.defaultLogo;

                    cardEl.innerHTML = `
                        <div class="h-[120px] w-full flex items-end pb-4 px-10">
                            <div class="flex items-center justify-between w-full">
                                <div class="flex flex-col">
                                    <h2 class="text-white text-3xl font-black italic uppercase leading-none">${card.platformId.toUpperCase()}</h2>
                                    <span class="text-white/70 text-[11px] mt-1.5 uppercase font-bold">${card.handle}</span>
                                </div>
                                <div class="w-16 h-16 bg-white rounded-2xl p-3 shadow-xl"><img src="${icon}" class="w-full h-full object-contain"></div>
                            </div>
                        </div>
                        <div class="flex-1 flex items-center justify-center p-8">
                             <div class="p-5 bg-white/5 backdrop-blur-3xl rounded-[3rem] border border-white/10" id="qr-${i}"></div>
                        </div>
                    `;

                    container.appendChild(cardEl);
                    
                    // Generate QR
                    new QRCodeStyling({
                        width: 200, height: 200, data: card.url, image: icon,
                        dotsOptions: { color: "#fff", type: "rounded" },
                        backgroundOptions: { color: "transparent" },
                        imageOptions: { margin: 4, imageSize: 0.4 }
                    }).append(document.getElementById(`qr-${i}`));

                    // Dots
                    const dot = document.createElement('div');
                    dot.className = `h-1.5 rounded-full transition-all duration-500 ${isActive ? 'w-10 bg-white' : 'w-1.5 bg-neutral-900'}`;
                    dots.appendChild(dot);
                });
            }
            lucide.createIcons();
        }

        // Swipe Logic
        let startX = 0;
        document.getElementById('card-container').addEventListener('touchstart', e => startX = e.touches[0].clientX);
        document.getElementById('card-container').addEventListener('touchend', e => {
            const diff = e.changedTouches[0].clientX - startX;
            if (Math.abs(diff) > 50) {
                currentIndex = (currentIndex + 1) % cards.length;
                render();
            }
        });

        function openForge() {
            editingId = null;
            tempCard = { platformId: 'twitter', handle: '', url: '', bgColor: '#1DA1F2', bgImage: null, customIcon: null };
            showForge();
        }

        function showForge() {
            const overlay = document.getElementById('forge-overlay');
            overlay.classList.remove('hidden');
            overlay.innerHTML = `
                <div class="bg-[#080808] w-full max-w-lg rounded-[4rem] p-10 border border-white/10 max-h-[96vh] overflow-y-auto no-scrollbar">
                    <div class="flex justify-between items-center mb-10">
                        <h3 class="text-3xl font-black italic uppercase">${editingId ? 'Refine' : 'Forge'}</h3>
                        <button onclick="closeOverlay('forge-overlay')" class="w-12 h-12 bg-neutral-900 rounded-2xl flex items-center justify-center"><i data-lucide="x"></i></button>
                    </div>
                    <div class="space-y-8">
                        <div class="grid grid-cols-5 gap-2">
                            ${PLATFORMS.map(p => `
                                <button onclick="selectPlatform('${p.id}')" class="h-12 rounded-xl flex items-center justify-center ${tempCard.platformId === p.id ? 'bg-white text-black' : 'bg-neutral-900 text-neutral-500'}">
                                    <i data-lucide="${p.icon}" class="w-5 h-5"></i>
                                </button>
                            `).join('')}
                        </div>
                        <input type="text" id="f-handle" placeholder="Handle" value="${tempCard.handle}" class="w-full bg-black border border-white/5 rounded-2xl p-6 text-white font-bold outline-none">
                        <input type="url" id="f-url" placeholder="URL" value="${tempCard.url}" class="w-full bg-black border border-white/5 rounded-2xl p-6 text-white font-bold outline-none">
                        <button onclick="saveCard()" class="w-full bg-indigo-600 text-white font-black py-6 rounded-[2.5rem] text-xl uppercase tracking-tighter shadow-2xl">Save Identity</button>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        function selectPlatform(id) {
            const p = PLATFORMS.find(x => x.id === id);
            tempCard.platformId = id;
            tempCard.bgColor = p.color;
            showForge();
        }

        function saveCard() {
            tempCard.handle = document.getElementById('f-handle').value;
            tempCard.url = document.getElementById('f-url').value;
            if (!tempCard.handle || !tempCard.url) return;
            
            if (editingId) {
                cards = cards.map(c => c.id === editingId ? { ...tempCard, id: editingId } : c);
            } else {
                cards.push({ ...tempCard, id: Date.now().toString() });
            }
            
            localStorage.setItem('qr-vault-mobile-v1', JSON.stringify(cards));
            closeOverlay('forge-overlay');
            render();
        }

        function toggleDirectory() {
            const overlay = document.getElementById('directory-overlay');
            overlay.classList.toggle('hidden');
            overlay.innerHTML = `
                <div class="flex justify-between items-center mb-10">
                    <h2 class="text-4xl font-black italic uppercase tracking-tighter">Directory</h2>
                    <button onclick="closeOverlay('directory-overlay')" class="w-12 h-12 bg-white text-black rounded-2xl flex items-center justify-center"><i data-lucide="x"></i></button>
                </div>
                <div class="space-y-4 overflow-y-auto no-scrollbar">
                    ${cards.map(c => `
                        <div class="bg-neutral-900/60 p-4 rounded-3xl border border-white/5 flex items-center justify-between">
                            <div class="flex items-center gap-4">
                                <div class="w-12 h-12 bg-white rounded-xl p-2"><img src="${c.customIcon || PLATFORMS.find(p => p.id === c.platformId).defaultLogo}" class="w-full h-full object-contain"></div>
                                <div class="flex flex-col"><span class="font-black text-xs uppercase">${c.handle}</span></div>
                            </div>
                            <button onclick="deleteCard('${c.id}')" class="w-10 h-10 bg-red-600 rounded-xl flex items-center justify-center"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                        </div>
                    `).join('')}
                </div>
            `;
            lucide.createIcons();
        }

        function deleteCard(id) {
            cards = cards.filter(c => c.id !== id);
            localStorage.setItem('qr-vault-mobile-v1', JSON.stringify(cards));
            toggleDirectory();
            render();
        }

        function closeOverlay(id) { document.getElementById(id).classList.add('hidden'); }

        window.onload = render;
    </script>
</body>
</html>
