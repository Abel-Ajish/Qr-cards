<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vault | Private Identity</title>

    <!-- External Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
        
        :root {
            --app-scale: 1.0;
        }

        body { 
            background: radial-gradient(circle at 50% -20%, #1a1a2e 0%, #030303 60%);
            background-color: #030303; 
            color: white; 
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent; 
            overflow: hidden; 
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            margin: 0;
            display: flex;
            justify-content: center;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

        #master-container {
            width: calc(100% / var(--app-scale));
            height: calc(100% / var(--app-scale));
            transform-origin: top center;
            transform: scale(var(--app-scale));
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.3s cubic-bezier(0.2, 0, 0, 1);
            position: relative;
        }

        .italic-black { font-weight: 900; font-style: italic; letter-spacing: -0.05em; }
        
        .card-stack-item {
            transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.4s ease, box-shadow 0.4s ease;
            will-change: transform, opacity;
        }
        .card-dragging { transition: none !important; }

        .platform-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            max-height: 200px;
            overflow-y: auto;
            padding: 4px;
        }

        .platform-btn img {
            width: 26px;
            height: 26px;
            object-fit: contain;
            transition: transform 0.2s ease;
        }
        .platform-btn:active img { transform: scale(0.9); }

        .force-white { filter: brightness(0) invert(1); }
        .glass-input {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }
        .glass-input:focus {
            background: rgba(255,255,255,0.06);
            border-color: rgba(99, 102, 241, 0.6);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.2);
        }

        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 24px; width: 24px; border-radius: 50%;
            background: #6366f1; cursor: pointer; margin-top: -10px;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.6); border: 2px solid white;
        }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; }

        @keyframes fadeIn { from { opacity: 0; backdrop-filter: blur(0px); } to { opacity: 1; backdrop-filter: blur(20px); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }

        .overlay-bg {
            position: absolute; inset: 0; background: rgba(0,0,0,0.85); z-index: 200;
            display: none; align-items: center; justify-content: center; padding: 20px;
        }
        .overlay-bg.active { display: flex; animation: fadeIn 0.3s ease-out forwards; }
        .modal-content { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        #toast-container {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 999;
            pointer-events: none; display: flex; flex-direction: column; gap: 8px;
        }
        .toast {
            background: rgba(255,255,255,0.95); color: #000; padding: 12px 24px; border-radius: 100px;
            font-weight: 700; font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5); display: flex; align-items: center; gap: 8px;
        }
    </style>
</head>
<body>

    <div id="master-container">
        <div id="toast-container"></div>

        <header class="w-full max-w-md pt-14 pb-4 px-8 flex justify-between items-start z-[100]">
            <div class="flex flex-col">
                <h1 class="text-5xl italic-black leading-none text-white uppercase tracking-tighter drop-shadow-lg">VAULT</h1>
                <p class="text-[9px] font-black tracking-[0.3em] text-indigo-400 uppercase mt-2 opacity-90">Private Identity</p>
            </div>
            <div class="flex gap-3">
                <button onclick="toggleDirectory()" class="w-12 h-12 bg-white/5 backdrop-blur-md rounded-2xl flex items-center justify-center border border-white/10 active:scale-90 transition-all">
                    <i data-lucide="layout-grid" class="w-5 h-5 text-white/80"></i>
                </button>
                <button onclick="openForge()" class="w-12 h-12 bg-white text-black rounded-2xl flex items-center justify-center shadow-lg hover:scale-105 active:scale-90 transition-all">
                    <i data-lucide="plus" class="w-6 h-6"></i>
                </button>
            </div>
        </header>

        <main id="card-container" class="relative w-full max-w-[360px] flex-1 mt-4 flex items-center justify-center perspective-[1000px]">
            <!-- Cards -->
        </main>

        <footer class="w-full py-8 flex flex-col items-center gap-4 z-[100]">
            <div id="dots-container" class="flex gap-2"></div>
        </footer>

        <div id="forge-overlay" class="overlay-bg items-end pb-6"></div>
        <div id="directory-overlay" class="overlay-bg flex-col !justify-start pt-24 pb-0"></div>
    </div>

    <script>
        const FALLBACK_ICON = 'https://cdn-icons-png.flaticon.com/512/1067/1067562.png';
        const PLATFORMS = [
            { id: 'Instagram', color: '#E4405F', logo: 'https://cdn-icons-png.flaticon.com/512/174/174855.png' },
            { id: 'Twitter', color: '#1DA1F2', logo: 'https://cdn-icons-png.flaticon.com/512/733/733579.png' },
            { id: 'GitHub', color: '#181717', logo: 'https://cdn-icons-png.flaticon.com/512/25/25231.png', forceWhite: true },
            { id: 'TikTok', color: '#000000', logo: 'https://cdn-icons-png.flaticon.com/512/3046/3046121.png', forceWhite: true },
            { id: 'LinkedIn', color: '#0077B5', logo: 'https://cdn-icons-png.flaticon.com/512/3536/3536505.png' },
            { id: 'YouTube', color: '#FF0000', logo: 'https://cdn-icons-png.flaticon.com/512/1384/1384060.png' },
            { id: 'Snapchat', color: '#FFFC00', logo: 'https://cdn-icons-png.flaticon.com/512/174/174870.png' },
            { id: 'Discord', color: '#5865F2', logo: 'https://cdn-icons-png.flaticon.com/512/3670/3670157.png' },
            { id: 'Twitch', color: '#9146FF', logo: 'https://cdn-icons-png.flaticon.com/512/5968/5968819.png' },
            // Replaced generic icon.png with a reliable global website icon
            { id: 'Website', color: '#4F46E5', logo: 'https://cdn-icons-png.flaticon.com/512/1006/1006771.png', forceWhite: true },
            { id: 'Custom', color: '#222222', logo: 'https://cdn-icons-png.flaticon.com/512/1828/1828817.png', forceWhite: true }
        ];

        let cards = JSON.parse(localStorage.getItem('qr-vault-production') || '[]');
        let globalScale = parseFloat(localStorage.getItem('qr-vault-scale') || '1.0');
        let currentIndex = 0;
        let tempCard = { platformId: 'Instagram', handle: '', url: '', bgColor: '#E4405F', customImage: null, qrLogo: null };

        function vibrate(ms = 10) { if (navigator.vibrate) navigator.vibrate(ms); }

        function showToast(message, icon = 'check-circle') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<i data-lucide="${icon}" class="w-4 h-4 text-indigo-600"></i> ${message}`;
            container.appendChild(toast);
            lucide.createIcons();
            setTimeout(() => {
                toast.style.transition = 'opacity 0.3s, transform 0.3s';
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        }

        async function processAndCropImage(dataUrl, targetWidth, targetHeight) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = targetWidth;
                    canvas.height = targetHeight;
                    const ctx = canvas.getContext('2d');
                    const targetRatio = targetWidth / targetHeight;
                    const imgRatio = img.width / img.height;
                    let sw, sh, sx, sy;
                    if (imgRatio > targetRatio) {
                        sh = img.height; sw = img.height * targetRatio;
                        sx = (img.width - sw) / 2; sy = 0;
                    } else {
                        sw = img.width; sh = img.width / targetRatio;
                        sx = 0; sy = (img.height - sh) / 2;
                    }
                    ctx.drawImage(img, sx, sy, sw, sh, 0, 0, targetWidth, targetHeight);
                    resolve(canvas.toDataURL('image/jpeg', 0.85));
                };
                img.src = dataUrl;
            });
        }

        function updateAppScale(val) {
            globalScale = parseFloat(val);
            localStorage.setItem('qr-vault-scale', globalScale);
            document.documentElement.style.setProperty('--app-scale', globalScale);
            if (document.getElementById('scale-val-display')) 
                document.getElementById('scale-val-display').innerText = globalScale.toFixed(2) + 'x';
        }

        function render() {
            updateAppScale(globalScale);
            const container = document.getElementById('card-container');
            const dots = document.getElementById('dots-container');
            container.innerHTML = ''; dots.innerHTML = '';

            if (cards.length === 0) {
                container.innerHTML = `<p class="opacity-40 text-[10px] font-black uppercase tracking-[0.5em]">Vault Empty</p>`;
            } else {
                cards.forEach((card, i) => {
                    const offset = i - currentIndex;
                    const cardEl = document.createElement('div');
                    cardEl.id = `card-${i}`;
                    cardEl.className = "card-stack-item absolute top-0 w-full max-w-[340px] h-[480px] rounded-[3rem] overflow-hidden border border-white/10";
                    
                    const xPos = offset * 380;
                    cardEl.style.cssText = `
                        transform: translate3d(${xPos}px, 0, 0) scale(${i === currentIndex ? 1 : 0.88});
                        z-index: ${100 - Math.abs(offset)};
                        opacity: ${i === currentIndex ? 1 : 0};
                        background-color: ${card.bgColor};
                        box-shadow: ${i === currentIndex ? '0 30px 60px rgba(0,0,0,0.8)' : 'none'};
                        ${card.customImage ? `background-image: url(${card.customImage}); background-size: cover; background-position: center;` : ''}
                        pointer-events: ${i === currentIndex ? 'auto' : 'none'};
                    `;

                    const p = PLATFORMS.find(p => p.id === card.platformId) || PLATFORMS[0];
                    cardEl.innerHTML = `
                        ${card.customImage ? '<div class="absolute inset-0 bg-black/50 backdrop-blur-[1px]"></div>' : ''}
                        <div class="relative z-10 h-full flex flex-col p-8 pt-12">
                            <div class="flex justify-between items-start">
                                <div class="flex flex-col text-white">
                                    <h2 class="text-4xl italic-black uppercase leading-none tracking-tighter">${card.platformId}</h2>
                                    <div class="w-10 h-1 bg-white/30 rounded-full mt-4"></div>
                                </div>
                                <div class="w-14 h-14 bg-white/10 backdrop-blur-xl rounded-2xl flex items-center justify-center border border-white/20">
                                    <img src="${p.logo}" onerror="this.src='${FALLBACK_ICON}'" class="w-8 h-8 object-contain ${p.forceWhite ? 'force-white' : ''}">
                                </div>
                            </div>
                            <div class="flex-1 flex flex-col items-center justify-center">
                                <div class="p-4 bg-white/10 backdrop-blur-2xl rounded-[2rem] border border-white/20 shadow-2xl" id="qr-${i}"></div>
                                <p class="mt-8 text-[11px] font-black tracking-[0.3em] text-white uppercase bg-black/30 px-6 py-2 rounded-full border border-white/10">${card.handle}</p>
                            </div>
                        </div>
                    `;
                    container.appendChild(cardEl);
                    
                    if (Math.abs(offset) <= 1) {
                        new QRCodeStyling({
                            width: 220, height: 220, data: card.url,
                            dotsOptions: { color: "#fff", type: "rounded" },
                            backgroundOptions: { color: "transparent" },
                            cornersSquareOptions: { type: "extra-rounded", color: "#fff" },
                            image: card.qrLogo || p.logo,
                            imageOptions: { crossOrigin: "anonymous", margin: 8, imageSize: 0.35 }
                        }).append(document.getElementById(`qr-${i}`));
                    }

                    const dot = document.createElement('div');
                    dot.className = `h-1.5 rounded-full transition-all duration-500 ${i === currentIndex ? 'w-8 bg-indigo-500' : 'w-2 bg-white/20'}`;
                    dots.appendChild(dot);
                });
            }
            lucide.createIcons();
            initDrag();
        }

        let isDragging = false, dragStartX = 0, currentDragX = 0;
        function initDrag() {
            const container = document.getElementById('card-container');
            container.ontouchstart = e => { if(cards.length < 2) return; dragStartX = e.touches[0].clientX; isDragging = true; };
            container.ontouchmove = e => {
                if (!isDragging) return;
                currentDragX = e.touches[0].clientX - dragStartX;
                const activeCard = document.getElementById(`card-${currentIndex}`);
                if (activeCard) {
                    const damp = (currentIndex === 0 && currentDragX > 0) || (currentIndex === cards.length-1 && currentDragX < 0) ? 0.3 : 1;
                    activeCard.style.transform = `translate3d(${currentDragX * damp}px, 0, 0) rotate(${currentDragX * 0.05}deg)`;
                }
            };
            container.ontouchend = () => {
                if (!isDragging) return; isDragging = false;
                const threshold = window.innerWidth * 0.2;
                if (currentDragX < -threshold && currentIndex < cards.length - 1) currentIndex++;
                else if (currentDragX > threshold && currentIndex > 0) currentIndex--;
                currentDragX = 0; render();
            };
        }

        function openOverlay(id) { document.getElementById(id).classList.add('active'); }
        function closeOverlay(id) { document.getElementById(id).classList.remove('active'); }

        function openForge() {
            tempCard = { platformId: 'Instagram', handle: '', url: '', bgColor: '#E4405F', customImage: null, qrLogo: null };
            renderForge();
            openOverlay('forge-overlay');
        }

        function renderForge() {
            const overlay = document.getElementById('forge-overlay');
            overlay.innerHTML = `
                <div class="modal-content w-full max-w-[380px] bg-[#0c0c0c] rounded-[3rem] p-8 pb-10 border border-white/10 shadow-2xl flex flex-col relative">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-2xl italic-black uppercase text-white tracking-tighter">FORGE</h3>
                        <button onclick="closeOverlay('forge-overlay')" class="w-10 h-10 bg-white/5 rounded-xl flex items-center justify-center text-white/50 border border-white/5"><i data-lucide="x"></i></button>
                    </div>
                    <div class="space-y-5">
                        <div class="platform-grid no-scrollbar">
                            ${PLATFORMS.map(p => `
                                <button onclick="selectPlatform('${p.id}')" class="platform-btn h-14 rounded-2xl flex items-center justify-center ${tempCard.platformId === p.id ? 'bg-white shadow-xl scale-105' : 'bg-white/5 border border-white/5'} transition-all">
                                    <img src="${p.logo}" onerror="this.src='${FALLBACK_ICON}'" class="${(p.forceWhite && tempCard.platformId !== p.id) ? 'force-white opacity-60' : ''}">
                                </button>`).join('')}
                        </div>
                        <input type="text" placeholder="@handle" value="${tempCard.handle}" oninput="tempCard.handle = this.value" class="glass-input w-full rounded-2xl px-5 py-4 text-white font-bold outline-none text-sm">
                        <input type="url" placeholder="Profile Link" value="${tempCard.url}" oninput="tempCard.url = this.value" class="glass-input w-full rounded-2xl px-5 py-4 text-white font-bold outline-none text-sm">
                        <div class="grid grid-cols-2 gap-3">
                            <label class="h-24 glass-input border-dashed rounded-2xl flex flex-col items-center justify-center cursor-pointer overflow-hidden relative">
                                <input type="file" accept="image/*" class="hidden" onchange="handleFile(this, 'customImage', 340, 480)">
                                ${tempCard.customImage ? `<img src="${tempCard.customImage}" class="absolute inset-0 w-full h-full object-cover">` : `<span class="text-[8px] font-black opacity-40 uppercase">Card Bg</span>`}
                            </label>
                            <label class="h-24 glass-input border-dashed rounded-2xl flex flex-col items-center justify-center cursor-pointer overflow-hidden relative">
                                <input type="file" accept="image/*" class="hidden" onchange="handleFile(this, 'qrLogo', 200, 200)">
                                ${tempCard.qrLogo ? `<img src="${tempCard.qrLogo}" class="absolute inset-0 w-full h-full object-cover">` : `<span class="text-[8px] font-black opacity-40 uppercase">QR Logo</span>`}
                            </label>
                        </div>
                        <button onclick="saveCard()" class="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl text-xs tracking-widest uppercase shadow-xl active:scale-95 transition-all">Forge Identity</button>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        async function handleFile(input, target, w, h) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                const cropped = await processAndCropImage(e.target.result, w, h);
                tempCard[target] = cropped;
                renderForge();
            };
            reader.readAsDataURL(file);
        }

        function selectPlatform(id) {
            const p = PLATFORMS.find(x => x.id === id);
            tempCard.platformId = id; tempCard.bgColor = p.color;
            renderForge();
        }

        function saveCard() {
            if (!tempCard.handle || !tempCard.url) return showToast("Enter handle & link", "alert-circle");
            cards.unshift({ ...tempCard, id: Date.now().toString() });
            localStorage.setItem('qr-vault-production', JSON.stringify(cards));
            currentIndex = 0; closeOverlay('forge-overlay');
            showToast("Vault Updated"); render();
        }

        function toggleDirectory() {
            const overlay = document.getElementById('directory-overlay');
            if (overlay.classList.contains('active')) return closeOverlay('directory-overlay');
            overlay.innerHTML = `
                <div class="modal-content w-full max-w-[380px] flex flex-col h-full max-h-[85vh]">
                    <div class="flex justify-between items-center mb-8 px-2 shrink-0">
                        <h2 class="text-3xl italic-black uppercase text-white tracking-tighter leading-none">DIRECTORY</h2>
                        <button onclick="closeOverlay('directory-overlay')" class="w-12 h-12 bg-white/10 rounded-2xl flex items-center justify-center"><i data-lucide="x"></i></button>
                    </div>
                    <div class="bg-white/5 border border-white/10 rounded-3xl p-6 mb-6 flex flex-col gap-4 shrink-0">
                        <div class="flex justify-between text-[10px] font-black uppercase tracking-widest text-indigo-400">
                            <span>Global Scaling</span>
                            <span id="scale-val-display">${globalScale.toFixed(2)}x</span>
                        </div>
                        <input type="range" min="0.7" max="1.3" step="0.05" value="${globalScale}" oninput="updateAppScale(this.value)">
                    </div>
                    <div class="space-y-3 overflow-y-auto no-scrollbar flex-1 pb-10">
                        ${cards.map(c => `
                            <div class="bg-white/5 p-3 rounded-2xl flex items-center justify-between border border-white/5">
                                <div class="flex items-center gap-4">
                                    <div class="w-12 h-12 bg-black/40 rounded-xl overflow-hidden flex items-center justify-center border border-white/10">
                                        <img src="${c.customImage || (PLATFORMS.find(p => p.id === c.platformId)?.logo)}" onerror="this.src='${FALLBACK_ICON}'" class="w-full h-full object-cover">
                                    </div>
                                    <div class="flex flex-col">
                                        <span class="font-black text-[8px] text-indigo-400 uppercase tracking-tighter">${c.platformId}</span>
                                        <span class="font-bold text-sm text-white/90 truncate max-w-[120px]">${c.handle}</span>
                                    </div>
                                </div>
                                <button onclick="deleteCard('${c.id}')" class="w-10 h-10 bg-red-500/10 text-red-500 rounded-xl flex items-center justify-center"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            lucide.createIcons(); openOverlay('directory-overlay');
        }

        function deleteCard(id) {
            cards = cards.filter(c => c.id !== id);
            localStorage.setItem('qr-vault-production', JSON.stringify(cards));
            currentIndex = 0; render(); toggleDirectory();
        }

        window.onload = render;
    </script>
</body>
</html>
