<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vault | Private Identity</title>

    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="QR Vault">
    <meta name="mobile-web-app-capable" content="yes">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            background-color: #030303; 
            color: white; 
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent; 
            overflow: hidden; 
            height: 100vh;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .italic-black { font-weight: 900; font-style: italic; letter-spacing: -0.05em; }
        
        /* Ensure the app takes up the full screen on iOS */
        @supports (-webkit-touch-callout: none) {
          .min-h-screen { min-height: -webkit-fill-available; }
        }
    </style>
</head>
<body class="flex flex-col items-center">

    <header class="w-full max-w-md pt-14 pb-4 px-8 flex justify-between items-start z-[100]">
        <div class="flex flex-col">
            <h1 class="text-5xl italic-black leading-none text-white">VAULT</h1>
            <p class="text-[10px] font-black tracking-[0.3em] text-indigo-500 uppercase mt-2">Private Identity</p>
        </div>
        <div class="flex gap-3">
            <button onclick="toggleDirectory()" class="w-12 h-12 bg-neutral-900 rounded-2xl flex items-center justify-center border border-white/5 active:scale-90 transition-all">
                <i data-lucide="settings" class="w-5 h-5 opacity-70"></i>
            </button>
            <button onclick="openForge()" class="w-12 h-12 bg-white text-black rounded-2xl flex items-center justify-center shadow-xl active:scale-90 transition-all">
                <i data-lucide="plus" class="w-6 h-6"></i>
            </button>
        </div>
    </header>

    <main id="card-container" class="relative w-full max-w-[350px] flex-1 mt-6 flex items-center justify-center">
        </main>

    <footer class="w-full py-10 flex flex-col items-center gap-4 z-[100]">
        <div id="dots-container" class="flex gap-2"></div>
        <div class="flex flex-col items-center opacity-30">
            <p class="text-[9px] font-black tracking-[0.4em] uppercase">Swipe for next</p>
            <i data-lucide="chevron-down" class="w-4 h-4 mt-1"></i>
        </div>
    </footer>

    <div id="forge-overlay" class="fixed inset-0 z-[200] bg-black hidden flex items-end justify-center px-4 pb-4"></div>
    <div id="directory-overlay" class="fixed inset-0 z-[180] bg-black/98 backdrop-blur-3xl hidden flex flex-col p-8 pt-32"></div>

    <script>
        const PLATFORMS = [
            { id: 'twitter', name: 'Twitter', color: '#1DA1F2', icon: 'twitter', logo: 'https://cdn-icons-png.flaticon.com/512/733/733579.png' },
            { id: 'instagram', name: 'Instagram', color: '#E4405F', icon: 'instagram', logo: 'https://cdn-icons-png.flaticon.com/512/174/174855.png' },
            { id: 'linkedin', name: 'LinkedIn', color: '#0077B5', icon: 'linkedin', logo: 'https://cdn-icons-png.flaticon.com/512/174/174857.png' },
            { id: 'website', name: 'Website', color: '#4CAF50', icon: 'globe', logo: 'https://cdn-icons-png.flaticon.com/512/1006/1006771.png' }
        ];

        let cards = JSON.parse(localStorage.getItem('qr-vault-v30') || '[]');
        let currentIndex = 0;
        let tempCard = { platformId: 'twitter', handle: '', url: '', bgColor: '#1DA1F2' };

        function render() {
            const container = document.getElementById('card-container');
            const dots = document.getElementById('dots-container');
            container.innerHTML = '';
            dots.innerHTML = '';

            if (cards.length === 0) {
                container.innerHTML = `
                    <div class="text-center opacity-20 flex flex-col items-center gap-4">
                        <i data-lucide="shield-off" class="w-12 h-12"></i>
                        <p class="text-xs font-bold tracking-widest uppercase">No Identities Found</p>
                    </div>
                `;
            } else {
                cards.forEach((card, i) => {
                    const offset = (i - currentIndex + cards.length) % cards.length;
                    if (offset > 2) return;

                    const cardEl = document.createElement('div');
                    cardEl.className = "absolute top-0 w-full h-[480px] rounded-[3.5rem] shadow-[0_30px_60px_rgba(0,0,0,0.5)] flex flex-col transition-all duration-500 ease-out border border-white/5";
                    
                    const scale = 1 - (offset * 0.06);
                    const yPos = offset * 25;
                    cardEl.style.cssText = `
                        transform: translate3d(0, ${yPos}px, 0) scale(${scale});
                        z-index: ${100 - offset};
                        background-color: ${card.bgColor};
                    `;

                    const platform = PLATFORMS.find(p => p.id === card.platformId) || PLATFORMS[0];

                    cardEl.innerHTML = `
                        <div class="pt-12 px-10 flex justify-between items-start">
                            <div class="flex flex-col">
                                <span class="text-[9px] font-black tracking-widest text-white/40 uppercase mb-1">Authenticated Identity</span>
                                <h2 class="text-4xl italic-black uppercase leading-none text-white">${card.platformId}</h2>
                                <div class="w-8 h-1 bg-white/20 rounded-full mt-3"></div>
                            </div>
                            <div class="w-14 h-14 bg-white/10 backdrop-blur-xl rounded-2xl flex items-center justify-center border border-white/10">
                                <img src="${platform.logo}" class="w-8 h-8 object-contain opacity-90">
                            </div>
                        </div>
                        <div class="flex-1 flex flex-col items-center justify-center px-10">
                            <div class="p-4 bg-white/5 backdrop-blur-2xl rounded-[2.5rem] border border-white/10 relative" id="qr-${i}">
                                <div class="absolute -top-2 -right-2 w-7 h-7 bg-white text-black rounded-full flex items-center justify-center shadow-lg">
                                    <i data-lucide="shield-check" class="w-4 h-4"></i>
                                </div>
                            </div>
                            <p class="mt-8 text-[11px] font-black tracking-[0.2em] text-white/60 uppercase">${card.handle}</p>
                        </div>
                    `;

                    container.appendChild(cardEl);
                    new QRCodeStyling({
                        width: 210, height: 210, data: card.url,
                        dotsOptions: { color: "#fff", type: "rounded" },
                        backgroundOptions: { color: "transparent" },
                        cornersSquareOptions: { type: "extra-rounded", color: "#fff" }
                    }).append(document.getElementById(`qr-${i}`));

                    const dot = document.createElement('div');
                    dot.className = `h-1.5 rounded-full transition-all duration-500 ${i === currentIndex ? 'w-8 bg-white' : 'w-1.5 bg-neutral-800'}`;
                    dots.appendChild(dot);
                });
            }
            lucide.createIcons();
        }

        let startY = 0;
        document.body.addEventListener('touchstart', e => startY = e.touches[0].clientY);
        document.body.addEventListener('touchend', e => {
            if (cards.length < 2) return;
            const diff = e.changedTouches[0].clientY - startY;
            if (diff < -50) { 
                currentIndex = (currentIndex + 1) % cards.length;
                render();
            } else if (diff > 50) {
                currentIndex = (currentIndex - 1 + cards.length) % cards.length;
                render();
            }
        });

        function openForge() {
            tempCard = { platformId: 'twitter', handle: '', url: '', bgColor: '#1DA1F2' };
            const overlay = document.getElementById('forge-overlay');
            overlay.classList.remove('hidden');
            overlay.innerHTML = `
                <div class="bg-neutral-900 w-full max-w-lg rounded-[3.5rem] p-8 border border-white/5 shadow-2xl">
                    <div class="flex justify-between items-center mb-8">
                        <h3 class="text-2xl italic-black uppercase text-white">Forge Entry</h3>
                        <button onclick="closeOverlay('forge-overlay')" class="w-10 h-10 bg-black rounded-xl flex items-center justify-center"><i data-lucide="x" class="w-5 h-5 text-white"></i></button>
                    </div>
                    <div class="space-y-6">
                        <div class="grid grid-cols-4 gap-2">
                            ${PLATFORMS.map(p => `
                                <button onclick="selectPlatform('${p.id}')" class="h-12 rounded-xl flex items-center justify-center ${tempCard.platformId === p.id ? 'bg-white text-black' : 'bg-black text-neutral-600'}">
                                    <i data-lucide="${p.icon}" class="w-5 h-5"></i>
                                </button>
                            `).join('')}
                        </div>
                        <input type="text" id="f-handle" placeholder="@username" class="w-full bg-black border border-white/5 rounded-2xl p-5 text-white font-bold outline-none focus:border-indigo-500">
                        <input type="url" id="f-url" placeholder="https://..." class="w-full bg-black border border-white/5 rounded-2xl p-5 text-white font-bold outline-none focus:border-indigo-500">
                        <button onclick="saveCard()" class="w-full bg-indigo-600 text-white font-black py-5 rounded-[2rem] text-lg uppercase tracking-tighter active:scale-95 transition-all">Save Identity</button>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        function selectPlatform(id) {
            const p = PLATFORMS.find(x => x.id === id);
            tempCard.platformId = id;
            tempCard.bgColor = p.color;
            openForge();
        }

        function saveCard() {
            const h = document.getElementById('f-handle').value;
            const u = document.getElementById('f-url').value;
            if (!h || !u) return;
            cards.push({ ...tempCard, handle: h, url: u, id: Date.now().toString() });
            localStorage.setItem('qr-vault-v30', JSON.stringify(cards));
            closeOverlay('forge-overlay');
            render();
        }

        function toggleDirectory() {
            const overlay = document.getElementById('directory-overlay');
            overlay.classList.remove('hidden');
            overlay.innerHTML = `
                <div class="flex justify-between items-center mb-10">
                    <h2 class="text-4xl italic-black uppercase text-white">Directory</h2>
                    <button onclick="closeOverlay('directory-overlay')" class="w-12 h-12 bg-white text-black rounded-2xl flex items-center justify-center"><i data-lucide="x"></i></button>
                </div>
                <div class="space-y-3 overflow-y-auto no-scrollbar">
                    ${cards.map(c => `
                        <div class="bg-white/5 p-4 rounded-3xl flex items-center justify-between border border-white/5">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 bg-white rounded-lg p-2"><img src="${PLATFORMS.find(p => p.id === c.platformId).logo}" class="w-full h-full object-contain"></div>
                                <span class="font-bold text-xs uppercase opacity-70 text-white">${c.handle}</span>
                            </div>
                            <button onclick="deleteCard('${c.id}')" class="text-red-500 p-2"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                        </div>
                    `).join('')}
                </div>
            `;
            lucide.createIcons();
        }

        function deleteCard(id) {
            cards = cards.filter(c => c.id !== id);
            localStorage.setItem('qr-vault-v30', JSON.stringify(cards));
            toggleDirectory();
            render();
        }

        function closeOverlay(id) { document.getElementById(id).classList.add('hidden'); }
        window.onload = render;
    </script>
</body>
</html>
